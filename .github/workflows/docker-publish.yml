name: Build and publish Docker image to Artifact Registry

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  LOCATION: ${{ secrets.ARTIFACT_REGISTRY_LOCATION }} # e.g. asia-east1
  REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }} # e.g. tw-student-repo
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }} # e.g. backend

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP (service account key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker credential helper for Artifact Registry
        run: |
          gcloud auth configure-docker ${LOCATION}-docker.pkg.dev --quiet
        env:
          LOCATION: ${{ env.LOCATION }}

      - name: Build and push image (with Buildx + cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          # adjust Dockerfile/context as needed (example: services/backend)
          file: services/backend/Dockerfile
          push: true
          tags: |
            ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
